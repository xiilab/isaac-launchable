# REDACTED: 민감 정보는 git에 포함하지 않음
# 실제 배포 전 아래 명령으로 시크릿을 직접 생성하세요:
#
# kubectl create secret generic isaac-launchable-secret \
#   -n isaac-launchable \
#   --from-literal=VSCODE_PASSWORD=<your-password>
#
# CSI-S3 시크릿 (kube-system 네임스페이스):
# kubectl create secret generic csi-s3-secret \
#   -n kube-system \
#   --from-literal=accessKeyID=<minio-access-key> \
#   --from-literal=secretAccessKey=<minio-secret-key> \
#   --from-literal=endpoint=http://10.61.3.117:9000 \
#   --from-literal=region=us-east-1
apiVersion: v1
kind: Secret
metadata:
  name: isaac-launchable-secret
  namespace: isaac-launchable
type: Opaque
stringData:
  VSCODE_PASSWORD: "CHANGEME"
