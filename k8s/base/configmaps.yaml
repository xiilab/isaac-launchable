# isaac-launchable 공통 설정 ConfigMap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: isaac-launchable-config
  namespace: isaac-launchable
data:
  ENV: instance
  FORCE_WSS: "false"
  SIGNALING_PORT: "80"
  TURN_URI: "turn:10.61.3.74:3478"
---
# Kit TURN 오버라이드 — 모든 isaac-launchable 파드 공통
# WebRTC 미디어를 coturn(10.61.3.74:3478)으로 relay 강제 → pod ephemeral UDP 외부 노출 불필요
apiVersion: v1
kind: ConfigMap
metadata:
  name: kit-turn-override
  namespace: isaac-launchable
data:
  turn.toml: |
    [settings.exts."omni.kit.livestream.webrtc"]
    iceServers = "[{\"urls\":[\"turn:10.61.3.74:3478?transport=udp\",\"turn:10.61.3.74:3478?transport=tcp\"],\"username\":\"isaac\",\"credential\":\"isaac\"}]"
    iceTransportPolicy = "relay"
---
# Isaac Sim (Pod-0) nginx 설정
# - / → localhost:8080 (VSCode)
# - /viewer/ → localhost:5173 (Web Viewer)
# - /sign_in → localhost:49100 (Kit 직결; gateway 제거됨)
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config-0
  namespace: isaac-launchable
data:
  nginx.conf: |
    worker_processes auto;
    pid /etc/nginx/.nginx.pid;
    load_module /usr/lib/nginx/modules/ndk_http_module.so;
    load_module /usr/lib/nginx/modules/ngx_http_lua_module.so;
    events { worker_connections 768; }
    http {
      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      client_max_body_size 0;
      keepalive_timeout 65;
      types_hash_max_size 2048;
      default_type application/octet-stream;
      ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
      ssl_prefer_server_ciphers on;
      ssl_certificate /etc/nginx/tls/cert.pem;
      ssl_certificate_key /etc/nginx/tls/key.pem;
      access_log /var/log/access.log;
      error_log /var/log/error.log;
      gzip on;
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }
      server {
        listen 80 default_server;
        listen [::]:80 default_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
        location / {
          proxy_pass http://localhost:8080/;
        }
        location = /viewer { return 301 /viewer/; }
        location /viewer/ {
          proxy_pass http://localhost:5173/viewer/;
        }
        location /sign_in {
          proxy_pass http://localhost:49100/sign_in;
        }
        location /api/clipboard/ {
          proxy_pass http://localhost:8011/clipboard/;
          proxy_set_header Connection "";
        }
      }
      server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_redirect off;
        location / {
          proxy_pass http://localhost:8080/;
        }
        location = /viewer { return 301 /viewer/; }
        location /viewer/ {
          proxy_pass http://localhost:5173/viewer/;
        }
        location /sign_in {
          proxy_pass http://localhost:49100/sign_in;
        }
        location /api/clipboard/ {
          proxy_pass http://localhost:8011/clipboard/;
          proxy_set_header Connection "";
        }
      }
    }
---
