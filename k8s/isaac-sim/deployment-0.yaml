# Isaac Sim 6.0 + Isaac Lab 2.1.1 - VSCode 개발 환경 + Kit 스트리밍
# 접속: http://10.61.3.125/ (nginx-ovas Ingress)
# WebRTC: ws-node074:47998/UDP (media), ws-node074:49100/TCP (signal)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: isaac-launchable-0
  namespace: isaac-launchable
  labels:
    app: isaac-launchable
    instance: pod-0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: isaac-launchable
      instance: pod-0
  template:
    metadata:
      labels:
        app: isaac-launchable
        instance: pod-0
    spec:
      nodeSelector:
        kubernetes.io/hostname: ws-node074
      hostname: isaac-launchable-0
      subdomain: isaac-launchable-headless
      dnsConfig:
        searches:
        - isaac-launchable-headless.isaac-launchable.svc.cluster.local
      containers:
      - name: vscode
        image: 10.61.3.124:30002/library/isaac-launchable-vscode:6.0.0-fix5364
        imagePullPolicy: Always
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: OMNI_KIT_ALLOW_ROOT
          value: "1"
        - name: ISAACSIM_STREAM_PORT
          value: "30998"
        - name: ISAACSIM_SIGNAL_PORT
          value: "49100"
        # ISAACSIM_HOST = host IP. Kit 이 `publicIp=host IP` 로 advertise
        # 하므로 브라우저가 외부에서 hostIP:30998/UDP 로 Kit 에 도달.
        # streamPort 는 advertise + 실제 UDP bind 둘 다 결정 (NvStreamServer
        # 가 동일 포트로 socket bind), hostPort 30998 매핑이 외부→bind 도달.
        - name: ISAACSIM_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: AUTO_ENABLE_DRIVER_SHADER_CACHE_WRAPPER
          value: hsscdns://memcached.isaac-launchable.svc.cluster.local
        # NVIDIA_VISIBLE_DEVICES 는 HAMi device-plugin 이 할당 GPU UUID 로 자동 주입.
        # "all" 로 덮어쓰면 HAMi 가시성 통제가 무력화되어 미할당 GPU 까지 노출 + 쿼터 우회됨.
        #- name: NVIDIA_DRIVER_CAPABILITIES
        #  value: all
        - name: DEFAULT_WORKSPACE
          value: /config/workspace
        ports:
        - name: vscode
          containerPort: 8080
        - name: webrtc-media
          containerPort: 30998
          protocol: UDP
        - name: webrtc-signal
          containerPort: 49100
          protocol: TCP
        resources:
          requests:
            cpu: "36"
            memory: 170Gi
            nvidia.com/gpu: "1"
          limits:
            cpu: "40"
            memory: 180Gi
            nvidia.com/gpu: "1"
      - name: nginx
        image: 10.61.3.124:30002/library/isaac-launchable-nginx:latest
        ports:
        - name: http
          containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
      - name: web-viewer
        image: 10.61.3.124:30002/library/isaac-launchable-viewer:latest
        env:
        - name: MEDIA_PORT
          value: "30998"
        - name: POD_INDEX
          value: "0"
        - name: SIGNAL_URL
          value: /sign_in
        ports:
        - name: viewer
          containerPort: 5173
      volumes:
      - name: nginx-conf
        configMap:
          name: nginx-config-0



