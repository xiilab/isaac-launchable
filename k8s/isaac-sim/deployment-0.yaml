# Isaac Sim 6.0 + Isaac Lab 2.1.1 - VSCode 개발 환경 + Kit 스트리밍
# 접속: http://10.61.3.125/ (nginx-ovas Ingress)
# WebRTC: ws-node074:47998/UDP (media), ws-node074:49100/TCP (signal)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: isaac-launchable-0
  namespace: isaac-launchable
  labels:
    app: isaac-launchable
    instance: pod-0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: isaac-launchable
      instance: pod-0
  template:
    metadata:
      labels:
        app: isaac-launchable
        instance: pod-0
    spec:
      nodeSelector:
        kubernetes.io/hostname: ws-node074
      hostname: isaac-launchable-0
      subdomain: isaac-launchable-headless
      dnsConfig:
        searches:
        - isaac-launchable-headless.isaac-launchable.svc.cluster.local
      # Kit 의 ephemeral UDP bind 를 30998 로 pinning. /proc/sys 가
      # 컨테이너 내부에서 read-only mount 이므로 runheadless.sh 의 echo
      # 로는 설정 불가 → k8s native sysctl injection 사용. k0s 1.22+ 에서
      # ip_local_port_range 는 safe sysctl 로 허용됨.
      securityContext:
        sysctls:
        - name: net.ipv4.ip_local_port_range
          value: "30998 30998"
      containers:
      - name: vscode
        image: 10.61.3.124:30002/library/isaac-launchable-vscode:6.0.0
        imagePullPolicy: Always
        # port pin 은 pod-level securityContext.sysctls 에서 처리 (위 spec.securityContext).
        # 컨테이너 레벨에서 추가 capability 불필요.
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: OMNI_KIT_ALLOW_ROOT
          value: "1"
        - name: ISAACSIM_STREAM_PORT
          value: "30998"
        - name: ISAACSIM_SIGNAL_PORT
          value: "49100"
        # ISAACSIM_HOST = host IP. Kit 이 `publicIp=host IP` 로 advertise
        # 하므로 브라우저가 외부에서 hostIP:30998/UDP 로 Kit 에 도달. 실제
        # Kit UDP bind 는 runheadless-script-0 의 ip_local_port_range pin
        # (30998 단일 포트) + deployment-0 의 hostPort 30998 매핑으로
        # advertise 와 일치.
        - name: ISAACSIM_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: AUTO_ENABLE_DRIVER_SHADER_CACHE_WRAPPER
          value: hsscdns://memcached.isaac-launchable.svc.cluster.local
        # NVIDIA_VISIBLE_DEVICES 는 HAMi device-plugin 이 할당 GPU UUID 로 자동 주입.
        # "all" 로 덮어쓰면 HAMi 가시성 통제가 무력화되어 미할당 GPU 까지 노출 + 쿼터 우회됨.
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: all
        - name: DEFAULT_WORKSPACE
          value: /config/workspace
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: isaac-launchable-secret
              key: VSCODE_PASSWORD
        - name: SUDO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: isaac-launchable-secret
              key: VSCODE_PASSWORD
        ports:
        - name: vscode
          containerPort: 8080
        - name: webrtc-media
          containerPort: 30998
          hostPort: 30998
          protocol: UDP
        - name: webrtc-signal
          containerPort: 49100
          protocol: TCP
        resources:
          requests:
            cpu: "36"
            memory: 170Gi
            nvidia.com/gpu: "1"
            nvidia.com/gpumem: "10000"
            nvidia.com/gpucores: "50"
          limits:
            cpu: "40"
            memory: 180Gi
            nvidia.com/gpu: "1"
            nvidia.com/gpumem: "10000"
            nvidia.com/gpucores: "50"
        volumeMounts:
        - name: ov-cache
          mountPath: /root/.cache/ov
        - name: ov-local-share
          mountPath: /root/.local/share/ov
        - name: workspace-data
          mountPath: /workspace/data
        - name: runheadless-script
          mountPath: /isaac-sim/runheadless.sh
          subPath: runheadless.sh
        - name: minio-omniverse
          mountPath: /mnt/minio
        - name: kit-turn
          mountPath: /etc/kit-turn.toml
          subPath: turn.toml
          readOnly: true
      - name: nginx
        image: 10.61.3.124:30002/library/isaac-launchable-nginx:latest
        ports:
        - name: http
          containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
      - name: web-viewer
        image: 10.61.3.124:30002/library/isaac-launchable-viewer:latest
        env:
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: isaac-launchable-config
              key: ENV
        - name: FORCE_WSS
          valueFrom:
            configMapKeyRef:
              name: isaac-launchable-config
              key: FORCE_WSS
        - name: SIGNALING_PORT
          valueFrom:
            configMapKeyRef:
              name: isaac-launchable-config
              key: SIGNALING_PORT
        - name: MEDIA_SERVER
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: MEDIA_PORT
          value: "30998"
        - name: POD_INDEX
          value: "0"
        - name: SIGNAL_URL
          value: /sign_in
        ports:
        - name: viewer
          containerPort: 5173
      volumes:
      - name: ov-cache
        persistentVolumeClaim:
          claimName: isaac-ov-cache-pvc-0
      - name: ov-local-share
        persistentVolumeClaim:
          claimName: isaac-ov-local-share-pvc-0
      - name: workspace-data
        persistentVolumeClaim:
          claimName: isaac-workspace-pvc-0
      - name: nginx-conf
        configMap:
          name: nginx-config-0
      - name: runheadless-script
        configMap:
          name: runheadless-script-0
          defaultMode: 0755
      - name: minio-omniverse
        persistentVolumeClaim:
          claimName: minio-omniverse-pvc
      - name: kit-turn
        configMap:
          name: kit-turn-override
