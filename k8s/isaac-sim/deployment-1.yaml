# Isaac Sim 6.0 + Isaac Lab 2.1.1 - VSCode 개발 환경 + Kit 스트리밍 (Pod-1)
# 접속: http://10.61.3.125/ (nginx-ovas Ingress, host: isaac-launchable-1.local)
# WebRTC: ws-node074:30999/UDP (media, NodePort), Service isaac-launchable-1-lb:49100/TCP (signal)
# 주의: pod-1은 hostPort 미사용 (Service로만 노출) — pod-0의 signal hostPort 49100과 충돌 회피
apiVersion: apps/v1
kind: Deployment
metadata:
  name: isaac-launchable-1
  namespace: isaac-launchable
  labels:
    app: isaac-launchable
    instance: pod-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: isaac-launchable
      instance: pod-1
  template:
    metadata:
      labels:
        app: isaac-launchable
        instance: pod-1
    spec:
      nodeSelector:
        kubernetes.io/hostname: ws-node074
      hostname: isaac-launchable-1
      subdomain: isaac-launchable-headless
      dnsConfig:
        searches:
        - isaac-launchable-headless.isaac-launchable.svc.cluster.local
      containers:
      - name: vscode
        image: 10.61.3.124:30002/library/isaac-launchable-vscode:6.0.0-fix5364
        imagePullPolicy: Always
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: OMNI_KIT_ALLOW_ROOT
          value: "1"
        - name: ISAACSIM_STREAM_PORT
          value: "30999"
        - name: ISAACSIM_SIGNAL_PORT
          value: "49100"
        # runheadless.sh 가 --/exts/omni.kit.livestream.app/primaryStream/publicIp 로 주입.
        # 비어 있으면 NVST 가 pod internal IP (10.244.x.x) 을 candidate 로 advertise → 외부 도달 불가.
        - name: ISAACSIM_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: AUTO_ENABLE_DRIVER_SHADER_CACHE_WRAPPER
          value: hsscdns://memcached.isaac-launchable.svc.cluster.local
        # NVIDIA_VISIBLE_DEVICES 는 HAMi device-plugin 이 할당 GPU UUID 로 자동 주입.
        # "all" 로 덮어쓰면 HAMi 가시성 통제가 무력화되어 미할당 GPU 까지 노출 + 쿼터 우회됨.
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: all
        - name: DEFAULT_WORKSPACE
          value: /config/workspace
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: isaac-launchable-secret
              key: VSCODE_PASSWORD
        - name: SUDO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: isaac-launchable-secret
              key: VSCODE_PASSWORD
        ports:
        - name: vscode
          containerPort: 8080
        - name: webrtc-media
          containerPort: 30999
          protocol: UDP
        - name: webrtc-signal
          containerPort: 49100
          protocol: TCP
        resources:
          requests:
            cpu: "36"
            memory: 170Gi
            nvidia.com/gpu: "1"
            nvidia.com/gpumem: "10000"
            nvidia.com/gpucores: "50"
          limits:
            cpu: "40"
            memory: 180Gi
            nvidia.com/gpu: "1"
            nvidia.com/gpumem: "10000"
            nvidia.com/gpucores: "50"
        volumeMounts:
        - name: ov-cache
          mountPath: /root/.cache/ov
        - name: ov-local-share
          mountPath: /root/.local/share/ov
        - name: workspace-data
          mountPath: /workspace/data
        - name: runheadless-script
          mountPath: /isaac-sim/runheadless.sh
          subPath: runheadless.sh
        - name: minio-omniverse
          mountPath: /mnt/minio
        - name: kit-turn
          mountPath: /etc/kit-turn.toml
          subPath: turn.toml
          readOnly: true
      - name: nginx
        image: 10.61.3.124:30002/library/isaac-launchable-nginx:latest
        ports:
        - name: http
          containerPort: 80
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
      - name: web-viewer
        image: 10.61.3.124:30002/library/isaac-launchable-viewer:latest
        env:
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: isaac-launchable-config
              key: ENV
        - name: FORCE_WSS
          valueFrom:
            configMapKeyRef:
              name: isaac-launchable-config
              key: FORCE_WSS
        - name: SIGNALING_PORT
          valueFrom:
            configMapKeyRef:
              name: isaac-launchable-config
              key: SIGNALING_PORT
        - name: MEDIA_SERVER
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: MEDIA_PORT
          value: "30999"
        - name: POD_INDEX
          value: "1"
        - name: SIGNAL_URL
          value: /sign_in
        ports:
        - name: viewer
          containerPort: 5173
      volumes:
      - name: ov-cache
        persistentVolumeClaim:
          claimName: isaac-ov-cache-pvc-1
      - name: ov-local-share
        persistentVolumeClaim:
          claimName: isaac-ov-local-share-pvc-1
      - name: workspace-data
        persistentVolumeClaim:
          claimName: isaac-workspace-pvc-1
      - name: nginx-conf
        configMap:
          name: nginx-config-1
      - name: runheadless-script
        configMap:
          name: runheadless-script-1
          defaultMode: 0755
      - name: minio-omniverse
        persistentVolumeClaim:
          claimName: minio-omniverse-pvc
      - name: kit-turn
        configMap:
          name: kit-turn-override
